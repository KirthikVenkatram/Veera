name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build + test (iOS 26 simulator)
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.0.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build
        working-directory: veera
        run: |
          xcodebuild \
            -project veera.xcodeproj \
            -scheme veera \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath /tmp/veera-derived \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Test
        working-directory: veera
        run: |
          xcodebuild \
            -project veera.xcodeproj \
            -scheme veera \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16 Plus,OS=latest' \
            -derivedDataPath /tmp/veera-derived \
            CODE_SIGNING_ALLOWED=NO \
            test

  lint:
    name: SwiftLint
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint --strict

  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run Semgrep
        run: semgrep --config .semgrep.yml --error
